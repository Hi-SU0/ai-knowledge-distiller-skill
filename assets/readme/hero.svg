<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">AI Knowledge Distiller knowledge graph</title>
  <desc id="hero-desc">Reliable video, paper, documentation, and GitHub sources converge into a shared RAG concept, then become linked source notes, topic maps, and comparisons in Obsidian.</desc>
  <rect width="1200" height="420" fill="#191727"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif">
    <rect x="48" y="38" width="1104" height="344" rx="26" fill="#F4F1FF" fill-opacity="0.03" stroke="#A9A2C8" stroke-opacity="0.30" stroke-width="1.5"/>

