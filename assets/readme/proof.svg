<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="proof-title proof-desc">
  <title id="proof-title">Source note and global concept format examples</title>
  <desc id="proof-desc">An annotated specimen board demonstrates the repository source-note and concept-note structures. The examples show provenance, completeness, timestamps, evidence labels, aliases, shared concepts, attribution, consensus, and conflicts.</desc>
  <rect width="1200" height="520" fill="#191727"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif">
    <text x="52" y="78" fill="#F4F1FF" font-size="30" font-weight="700">Traceable notes, shared concepts</text>
    <g transform="translate(920 48)">
      <rect width="228" height="38" rx="19" fill="#F4F1FF" fill-opacity="0.04" stroke="#35C7A5" stroke-width="1.5"/>
      <text x="114" y="26" fill="#35C7A5" font-size="18" font-weight="750" text-anchor="middle" letter-spacing="1.2">FORMAT EXAMPLES</text>
    </g>

    <text x="600" y="108" fill="#A9A2C8" font-size="18" text-anchor="middle">STRUCTURE DEMO · NOT ADOPTION OR PERFORMANCE CLAIMS</text>

    <rect x="48" y="122" width="536" height="350" rx="24" fill="#F4F1FF" fill-opacity="0.03" stroke="#A9A2C8" stroke-opacity="0.30" stroke-width="1.5"/>
    <rect x="616" y="122" width="536" height="350" rx="24" fill="#F4F1FF" fill-opacity="0.03" stroke="#A9A2C8" stroke-opacity="0.30" stroke-width="1.5"/>

    <g transform="translate(72 146)">
      <circle cx="9" cy="10" r="7" fill="#35C7A5"/>
      <text x="30" y="18" fill="#F4F1FF" font-size="22" font-weight="700">SOURCE NOTE</text>
      <text x="464" y="18" fill="#A9A2C8" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="end">example-source-note.md</text>

      <rect x="0" y="42" width="488" height="116" rx="12" fill="#191727" stroke="#A9A2C8" stroke-opacity="0.38"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">
        <text x="18" y="68" fill="#A9A2C8">type:</text><text x="110" y="68" fill="#F4F1FF">source-note</text>
        <text x="18" y="92" fill="#A9A2C8">source_id:</text><text x="110" y="92" fill="#F4F1FF">example-video-001</text>
        <text x="18" y="116" fill="#A9A2C8">processed:</text><text x="110" y="116" fill="#F4F1FF">2026-07-14</text>
        <text x="18" y="140" fill="#A9A2C8" font-size="18">COMPLETENESS:</text><text x="178" y="140" fill="#35C7A5" font-size="18">high</text>
      </g>
      <g transform="translate(0 176)">
        <rect width="232" height="64" rx="12" fill="#F4F1FF" fill-opacity="0.04" stroke="#A9A2C8" stroke-opacity="0.38"/>
        <text x="18" y="26" fill="#A9A2C8" font-size="18" font-weight="700" letter-spacing="1">PROVENANCE</text>
        <text x="18" y="49" fill="#F4F1FF" font-size="18">creator · platform · source</text>
        <rect x="248" width="240" height="64" rx="12" fill="#F4F1FF" fill-opacity="0.04" stroke="#A9A2C8" stroke-opacity="0.38"/>
        <text x="266" y="26" fill="#A9A2C8" font-size="18" font-weight="700" letter-spacing="1">TIMESTAMP</text>
        <text x="266" y="49" fill="#F4F1FF" font-size="18">03:10 · 08:20 · 14:40</text>
      </g>
      <text x="0" y="273" fill="#A9A2C8" font-size="18" font-weight="700" letter-spacing="1">EVIDENCE LABELS</text>
      <g transform="translate(0 287)" font-size="18" font-weight="650">
        <rect width="140" height="34" rx="17" fill="#7668FF" fill-opacity="0.22"/><text x="70" y="23" fill="#F4F1FF" text-anchor="middle">SOURCE STATED</text>
        <rect x="148" width="160" height="34" rx="17" fill="#7668FF" fill-opacity="0.22"/><text x="228" y="23" fill="#F4F1FF" text-anchor="middle">CREATOR VIEW</text>
        <rect x="316" width="126" height="34" rx="17" fill="#35C7A5" fill-opacity="0.16"/><text x="379" y="23" fill="#35C7A5" text-anchor="middle">INFERENCE</text>
      </g>
      <path d="M450 304 H476" stroke="#35C7A5" stroke-width="2"/><circle cx="476" cy="304" r="4" fill="#35C7A5"/>
    </g>

    <g transform="translate(640 146)">
      <circle cx="9" cy="10" r="7" fill="#7668FF"/>
      <text x="30" y="18" fill="#F4F1FF" font-size="22" font-weight="700">GLOBAL CONCEPT</text>
      <text x="464" y="18" fill="#A9A2C8" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="end">example-concept-note.md</text>

      <rect x="0" y="42" width="488" height="92" rx="12" fill="#7668FF" fill-opacity="0.22" stroke="#7668FF" stroke-width="1.5"/>
      <text x="22" y="84" fill="#F4F1FF" font-size="32" font-weight="750">[[RAG]]</text>
      <text x="22" y="113" fill="#A9A2C8" font-size="18">canonical · multi-source</text>
      <g transform="translate(314 58)">
        <text x="0" y="17" fill="#A9A2C8" font-size="18" font-weight="700" letter-spacing="1">ALIASES</text>
        <text x="0" y="42" fill="#F4F1FF" font-size="16">Retrieval-Augmented</text>
        <text x="0" y="63" fill="#F4F1FF" font-size="16">Generation</text>
      </g>

      <g transform="translate(0 144)">
        <rect width="210" height="72" rx="12" fill="#F4F1FF" fill-opacity="0.04" stroke="#A9A2C8" stroke-opacity="0.38"/>
        <text x="18" y="24" fill="#A9A2C8" font-size="18" font-weight="700" letter-spacing="0.5">SHARED CONCEPTS</text>
        <text x="18" y="49" fill="#F4F1FF" font-size="18">[[LLM]] · [[Embedding]]</text>
        <path d="M210 32 H222" stroke="#7668FF" stroke-width="2"/>
        <rect x="222" width="266" height="72" rx="12" fill="#F4F1FF" fill-opacity="0.04" stroke="#A9A2C8" stroke-opacity="0.38"/>
        <text x="240" y="24" fill="#A9A2C8" font-size="18" font-weight="700" letter-spacing="0.5">SOURCE ATTRIBUTION</text>
        <text x="240" y="48" fill="#F4F1FF" font-size="18">source note · location</text>
        <text x="240" y="68" fill="#A9A2C8" font-size="18">interpretation</text>
      </g>
      <g transform="translate(0 226)">
        <rect width="238" height="80" rx="12" fill="#35C7A5" fill-opacity="0.14" stroke="#35C7A5"/>
        <text x="18" y="26" fill="#35C7A5" font-size="18" font-weight="750" letter-spacing="1">CONSENSUS</text>
        <text x="18" y="52" fill="#F4F1FF" font-size="18">evidence before generation</text>
        <text x="18" y="70" fill="#A9A2C8" font-size="14">shared across sources</text>
        <rect x="250" width="238" height="80" rx="12" fill="#7668FF" fill-opacity="0.10" stroke="#7668FF"/>
        <text x="268" y="26" fill="#F4F1FF" font-size="18" font-weight="750" letter-spacing="1">CONFLICT</text>
        <text x="268" y="52" fill="#F4F1FF" font-size="18">retrieval strategy</text>
        <text x="268" y="70" fill="#A9A2C8" font-size="14">kept separate · verify later</text>
      </g>
    </g>

  </g>
</svg>
