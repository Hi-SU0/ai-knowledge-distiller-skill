<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="workflow-title workflow-desc">
  <title id="workflow-title">Five-stage knowledge distillation workflow</title>
  <desc id="workflow-desc">A five-stage workflow moves from reliable source acquisition through verification, restructuring, concept deduplication, and ongoing link and evidence maintenance.</desc>
  <rect width="1200" height="360" fill="#191727"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif">
    <text x="48" y="54" fill="#F4F1FF" font-size="30" font-weight="700">Source to living graph</text>
    <text x="1152" y="51" fill="#A9A2C8" font-size="18" text-anchor="end">ACQUIRE · CHECK · CONNECT · KEEP CURRENT</text>

    <path d="M140 128 H1060" fill="none" stroke="#A9A2C8" stroke-opacity="0.30" stroke-width="2"/>
    <g fill="#7668FF">
      <circle cx="156" cy="128" r="6"/><circle cx="378" cy="128" r="6"/><circle cx="600" cy="128" r="6"/><circle cx="822" cy="128" r="6"/><circle cx="1044" cy="128" r="6"/>
    </g>

    <g transform="translate(48 86)">
      <rect width="204" height="224" rx="22" fill="#F4F1FF" fill-opacity="0.03" stroke="#A9A2C8" stroke-opacity="0.38" stroke-width="1.5"/>
      <circle cx="28" cy="42" r="20" fill="#7668FF" fill-opacity="0.22" stroke="#7668FF"/>
      <text x="28" y="49" fill="#F4F1FF" font-size="18" font-weight="750" text-anchor="middle">01</text>
      <text x="102" y="90" fill="#F4F1FF" font-size="22" font-weight="750" text-anchor="middle">SOURCE</text>
      <g transform="translate(52 112)" fill="none" stroke="#35C7A5" stroke-width="2">
        <path d="M10 16 H88 L72 58 H26 Z"/>
        <path d="M34 16 V4 H66 V16"/>
        <circle cx="38" cy="72" r="5" fill="#35C7A5"/><circle cx="68" cy="72" r="5" fill="#35C7A5"/>
      </g>
      <text x="102" y="208" fill="#A9A2C8" font-size="18" text-anchor="middle">reliable material</text>
    </g>

    <g transform="translate(270 86)">
      <rect width="204" height="224" rx="22" fill="#F4F1FF" fill-opacity="0.03" stroke="#A9A2C8" stroke-opacity="0.38" stroke-width="1.5"/>
      <circle cx="28" cy="42" r="20" fill="#7668FF" fill-opacity="0.22" stroke="#7668FF"/>
      <text x="28" y="49" fill="#F4F1FF" font-size="18" font-weight="750" text-anchor="middle">02</text>
      <text x="102" y="90" fill="#F4F1FF" font-size="22" font-weight="750" text-anchor="middle">VERIFY</text>
      <g transform="translate(59 112)" fill="none" stroke-width="2">
        <rect x="0" y="0" width="86" height="72" rx="10" stroke="#A9A2C8" stroke-opacity="0.38"/>
        <path d="M18 22 L28 32 L45 14 M18 50 L28 60 L45 42" stroke="#35C7A5"/>
        <path d="M54 23 H70 M54 51 H70" stroke="#7668FF"/>
      </g>
      <text x="102" y="208" fill="#A9A2C8" font-size="18" text-anchor="middle">complete + evidenced</text>
    </g>

    <g transform="translate(492 86)">
      <rect width="204" height="224" rx="22" fill="#F4F1FF" fill-opacity="0.03" stroke="#A9A2C8" stroke-opacity="0.38" stroke-width="1.5"/>
      <circle cx="28" cy="42" r="20" fill="#7668FF" fill-opacity="0.22" stroke="#7668FF"/>
      <text x="28" y="49" fill="#F4F1FF" font-size="18" font-weight="750" text-anchor="middle">03</text>
      <text x="102" y="90" fill="#F4F1FF" font-size="20" font-weight="750" text-anchor="middle">RESTRUCTURE</text>
      <g transform="translate(48 112)" fill="none" stroke-width="2">
        <rect x="0" y="0" width="46" height="28" rx="7" stroke="#A9A2C8" stroke-opacity="0.38"/>
        <rect x="62" y="44" width="46" height="28" rx="7" stroke="#35C7A5"/>
        <path d="M46 14 H74 Q84 14 84 24 V44" stroke="#7668FF"/>
        <circle cx="84" cy="30" r="4" fill="#7668FF" stroke="none"/>
      </g>
      <text x="102" y="208" fill="#A9A2C8" font-size="18" text-anchor="middle">rebuild knowledge</text>
    </g>

    <g transform="translate(714 86)">
      <rect width="204" height="224" rx="22" fill="#F4F1FF" fill-opacity="0.03" stroke="#A9A2C8" stroke-opacity="0.38" stroke-width="1.5"/>
      <circle cx="28" cy="42" r="20" fill="#7668FF" fill-opacity="0.22" stroke="#7668FF"/>
      <text x="28" y="49" fill="#F4F1FF" font-size="18" font-weight="750" text-anchor="middle">04</text>
      <text x="102" y="90" fill="#F4F1FF" font-size="20" font-weight="750" text-anchor="middle">DEDUPLICATE</text>
      <g transform="translate(47 112)">
        <rect x="0" y="0" width="72" height="48" rx="10" fill="#F4F1FF" fill-opacity="0.04" stroke="#A9A2C8" stroke-opacity="0.38"/>
        <rect x="38" y="24" width="72" height="48" rx="10" fill="#7668FF" fill-opacity="0.22" stroke="#7668FF" stroke-width="2"/>
        <path d="M30 24 H38 M72 48 H80" stroke="#35C7A5" stroke-width="2"/>
        <text x="74" y="55" fill="#F4F1FF" font-size="18" font-weight="700" text-anchor="middle">[[ ]]</text>
      </g>
      <text x="102" y="208" fill="#A9A2C8" font-size="18" text-anchor="middle">one global concept</text>
    </g>

    <g transform="translate(936 86)">
      <rect width="216" height="224" rx="22" fill="#F4F1FF" fill-opacity="0.03" stroke="#35C7A5" stroke-width="1.5"/>
      <circle cx="28" cy="42" r="20" fill="#35C7A5" fill-opacity="0.16" stroke="#35C7A5"/>
      <text x="28" y="49" fill="#F4F1FF" font-size="18" font-weight="750" text-anchor="middle">05</text>
      <text x="108" y="90" fill="#F4F1FF" font-size="22" font-weight="750" text-anchor="middle">MAINTAIN</text>
      <g transform="translate(63 111)" fill="none" stroke-width="2">
        <path d="M16 20 A38 38 0 0 1 80 18" stroke="#35C7A5"/>
        <path d="M78 8 L82 19 L70 18" stroke="#35C7A5"/>
        <path d="M80 52 A38 38 0 0 1 16 54" stroke="#7668FF"/>
        <path d="M18 64 L14 53 L26 54" stroke="#7668FF"/>
        <circle cx="48" cy="36" r="10" stroke="#F4F1FF"/>
      </g>
      <text x="108" y="208" fill="#A9A2C8" font-size="18" text-anchor="middle">links + evidence</text>
    </g>
  </g>
</svg>
